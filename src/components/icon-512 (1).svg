<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  
  <!-- Chart bars -->
  <g opacity="0.3">
    <rect x="80" y="360" width="45" height="80" rx="6" fill="#0071e3"/>
    <rect x="140" y="320" width="45" height="120" rx="6" fill="#0071e3"/>
    <rect x="200" y="280" width="45" height="160" rx="6" fill="#0071e3"/>
    <rect x="260" y="240" width="45" height="200" rx="6" fill="#0071e3"/>
    <rect x="320" y="200" width="45" height="240" rx="6" fill="#0071e3"/>
    <rect x="380" y="160" width="45" height="280" rx="6" fill="#0071e3"/>
  </g>
  
  <!-- Main icon - dollar/graph hybrid -->
  <g transform="translate(256, 256)">
    <!-- Circle background -->
    <circle r="140" fill="#0071e3" opacity="0.15"/>
    <circle r="120" fill="#0071e3" opacity="0.2"/>
    
    <!-- Trend arrow up -->
    <path d="M -60 40 L 0 -60 L 60 0" 
          stroke="#34c759" 
          stroke-width="20" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
    
    <!-- Dollar sign -->
    <text x="0" y="25" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="160" 
          font-weight="800" 
          fill="#e8f1ff" 
          text-anchor="middle">
      $
    </text>
  </g>
  
  <!-- WealthOS text -->
  <text x="256" y="470" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="42" 
        font-weight="800" 
        fill="#e8f1ff" 
        text-anchor="middle">
    WealthOS
  </text>
</svg>
